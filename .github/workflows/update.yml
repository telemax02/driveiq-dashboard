name: DriveIQ Pipeline

on:
  schedule:
    - cron: '0 */4 * * *'   # every 4 hours
  workflow_dispatch:        # also allow manual trigger from GitHub UI

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # needed to push docs/index.html back

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install python-dotenv

      - name: Fetch Flespi data
        env:
          FLESPI_TOKEN: ${{ secrets.FLESPI_TOKEN }}
          FLESPI_CALC_ID: ${{ secrets.FLESPI_CALC_ID }}
        run: python score_v2.py

      - name: Geocode and build dashboard HTML
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python build_html.py

      - name: Extract trip GPS tracks + event locations
        env:
          FLESPI_TOKEN: ${{ secrets.FLESPI_TOKEN }}
        run: python trip_tracks.py

      - name: Sync to Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python supabase_sync.py

      - name: Commit updated dashboard and geo cache
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html geo_cache.json track_cache.json
          git diff --staged --quiet && echo "No changes" || (git commit -m "chore: auto-update dashboard [skip ci]" && git push)

      - name: Deploy to Vercel
        env:
          VERCEL_TOKEN:      ${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_ORG_ID:     ${{ secrets.VERCEL_ORG_ID }}
        run: npx vercel --prod --token "$VERCEL_TOKEN" --yes
